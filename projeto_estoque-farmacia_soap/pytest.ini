[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    soap: Testes de SOAP services
    medicamentos: Testes de ServiceMedicamentos
    estoque: Testes de ServiceEstoque
    transacoes: Testes de ServiceTransacoes (críticos)
    integracao: Testes de ServiceIntegracao
    unit: Testes unitários
    integration: Testes de integração
